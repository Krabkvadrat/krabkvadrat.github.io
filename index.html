<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Analyst Wiki</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f7f6f3;
    --bg-info: #e6f1fb;
    --bg-warning: #faeeda;
    --bg-danger: #fcebeb;
    --bg-success: #eaf3de;
    --text-primary: #1a1a1a;
    --text-secondary: #5a5a5a;
    --text-tertiary: #999;
    --text-info: #185fa5;
    --text-warning: #854f0b;
    --text-danger: #a32d2d;
    --text-success: #3b6d11;
    --border: rgba(0,0,0,0.10);
    --border-md: rgba(0,0,0,0.18);
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e;
      --bg-secondary: #262626;
      --bg-info: #0c2a45;
      --bg-warning: #3a2005;
      --bg-danger: #3a1010;
      --bg-success: #122408;
      --text-primary: #e8e8e8;
      --text-secondary: #aaa;
      --text-tertiary: #666;
      --text-info: #85b7eb;
      --text-warning: #fac775;
      --text-danger: #f09595;
      --text-success: #97c459;
      --border: rgba(255,255,255,0.10);
      --border-md: rgba(255,255,255,0.20);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  header {
    width: 100%;
    max-width: 900px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .nav-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 0.5px solid var(--border-md);
    background: var(--bg);
    color: var(--text-primary);
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }
  .nav-toggle:active { background: var(--bg-secondary); }
  .nav-toggle svg { width: 18px; height: 18px; }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
    flex: 1;
  }
  .current-article-title {
    display: none;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 90;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.2s ease, visibility 0s linear 0.2s;
  }
  .drawer-backdrop.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transition: opacity 0.2s ease, visibility 0s linear 0s;
  }

  .site-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .lang-toggle {
    display: flex;
    border: 0.5px solid var(--border-md);
    border-radius: 8px;
    overflow: hidden;
  }

  .lang-btn {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    cursor: pointer;
    color: var(--text-secondary);
    background: transparent;
    border: none;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }

  .lang-btn.active {
    background: var(--bg);
    color: var(--text-primary);
  }

  .page {
    display: flex;
    width: 100%;
    max-width: 900px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg);
    min-height: 580px;
  }

  .sidebar {
    width: 230px;
    flex-shrink: 0;
    border-right: 0.5px solid var(--border);
    background: var(--bg-secondary);
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 14px;
    border-bottom: 0.5px solid var(--border);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .nav-list { padding: 8px 0; }

  .nav-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px 6px;
    cursor: pointer;
    user-select: none;
  }
  .nav-section-header:hover { background: rgba(0,0,0,0.03); }
  .nav-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .nav-section-arrow {
    font-size: 10px;
    color: var(--text-tertiary);
    transition: transform 0.2s;
    display: inline-block;
  }
  .nav-section-arrow.open { transform: rotate(180deg); }
  .nav-section-items { overflow: hidden; transition: max-height 0.28s ease; }

  .nav-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s;
  }

  .nav-item:hover { background: var(--bg); }
  .nav-item.active { background: var(--bg); border-left-color: var(--text-primary); }

  .nav-icon {
    width: 26px;
    height: 26px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 14px;
  }

  .nav-label { font-size: 12px; font-weight: 500; color: var(--text-primary); line-height: 1.35; }
  .nav-tag { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

  pre {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    overflow-x: auto;
    margin: 12px 0;
  }
  code {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-primary);
  }
  p code, li code {
    background: var(--bg-secondary);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
    border: 0.5px solid var(--border);
  }
  a { color: var(--text-info); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 36px;
  }

  .article-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border: 0.5px solid var(--border);
  }

  h1 { font-size: 22px; font-weight: 500; color: var(--text-primary); line-height: 1.3; margin-bottom: 10px; }

  .lead {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 0.5px solid var(--border);
  }

  h2 { font-size: 14px; font-weight: 500; color: var(--text-primary); margin: 20px 0 8px; }

  p { font-size: 14px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 12px; }

  .checklist { list-style: none; margin-bottom: 16px; }
  .checklist li {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.65;
    padding: 4px 0 4px 24px;
    position: relative;
  }
  .checklist li::before {
    content: "✔";
    position: absolute;
    left: 0;
    color: var(--text-success);
    font-size: 12px;
    top: 5px;
  }

  .tip-box {
    background: var(--bg-secondary);
    border-left: 3px solid var(--border-md);
    padding: 12px 16px;
    margin: 16px 0;
  }
  .tip-box p { margin: 0; font-size: 13px; font-style: italic; }

  .step { display: flex; gap: 14px; margin-bottom: 14px; }
  .step-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 0.5px solid var(--border-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    flex-shrink: 0; margin-top: 1px;
  }
  .step-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
  .step-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.65; }

  .example-block {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin: 14px 0;
  }

  .video-embed {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    margin: 14px 0 20px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
  }
  .video-embed iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .video-meta {
    font-size: 13px;
    color: var(--text-tertiary);
    margin: -6px 0 14px;
  }
  .example-label {
    font-size: 11px; font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .dialog-line { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; line-height: 1.55; }
  .dialog-who { font-weight: 500; color: var(--text-primary); min-width: 90px; }
  .dialog-text { color: var(--text-secondary); }
  .dialog-line.good .dialog-who { color: var(--text-success); }
  .dialog-line.bad .dialog-who { color: var(--text-danger); }

  @media (max-width: 720px) {
    body { padding: 14px 10px 40px; }

    header {
      margin-bottom: 14px;
      gap: 10px;
      flex-wrap: nowrap;
    }
    .site-title { display: none; }
    .nav-toggle { display: inline-flex; }
    .current-article-title { display: block; }

    .page {
      border-radius: 10px;
      min-height: calc(100vh - 100px);
      position: relative;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 82%;
      max-width: 320px;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      border-right: 0.5px solid var(--border);
      box-shadow: 2px 0 18px rgba(0,0,0,0.18);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px;
    }
    .drawer-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 22px;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
      font-family: inherit;
    }

    .nav-section-header { padding: 12px 16px 8px; }
    .nav-item { padding: 12px 16px; gap: 12px; }
    .nav-label { font-size: 14px; }
    .nav-tag { font-size: 12px; }
    .nav-icon { width: 30px; height: 30px; font-size: 15px; }

    .content {
      padding: 20px 18px 28px;
      width: 100%;
    }

    h1 { font-size: 20px; }
    .lead { font-size: 14px; }
    pre { padding: 10px 12px; }
    code { font-size: 12px; }
  }

  @media (min-width: 721px) {
    .drawer-close { display: none; }
  }

  /* syntax highlighting */
  pre { position: relative; }
  .lang-badge {
    position: absolute; top: 7px; right: 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-tertiary);
    opacity: 0.55; pointer-events: none;
  }
  .kw-sql  { color: #4C9BE8; font-weight: 600; }
  .cm-sql  { color: var(--text-tertiary); font-style: italic; }
  .str-sql { color: #97c459; }
  .kw-py   { color: #4C9BE8; font-weight: 600; }
  .kw-blt  { color: #fac775; }
  .cm-py   { color: var(--text-tertiary); font-style: italic; }
  .str-py  { color: #97c459; }
  .dec-py  { color: #e8a87c; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="nav-toggle" id="nav-toggle" aria-label="Открыть меню" onclick="openDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="7" x2="20" y2="7"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
      </svg>
    </button>
    <div class="site-title" id="site-label">Data Analyst wiki</div>
    <div class="current-article-title" id="current-article-title"></div>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>

<div class="page">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span id="sidebar-title">Навигация</span>
      <button class="drawer-close" aria-label="Закрыть меню" onclick="closeDrawer()">×</button>
    </div>
    <div class="nav-list" id="nav"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
var currentLang = 'ru';
var currentSection = null;
var currentArticle = 0;

var manifest = null;
var sections = null;
var sectionOpen = null;
var navData = null;
var articleCache = {};

function loadManifest() {
  return fetch('manifest.json', { cache: 'no-cache' }).then(function(r) {
    if (!r.ok) throw new Error('manifest fetch failed: ' + r.status);
    return r.json();
  }).then(function(m) {
    manifest = m;
    sections = {};
    sectionOpen = {};
    navData = {};
    Object.keys(m.sections).forEach(function(key) {
      sections[key] = { ru: { label: m.sections[key].ru }, en: { label: m.sections[key].en } };
      sectionOpen[key] = !!m.sections[key].defaultOpen;
      navData[key] = [];
    });
    m.articles.forEach(function(a) {
      navData[a.section].push({
        slug: a.slug, icon: a.icon, bg: a.bg, color: a.color,
        ru: a.ru, en: a.en
      });
    });
    var firstOpen = Object.keys(sectionOpen).find(function(k) { return sectionOpen[k]; });
    currentSection = firstOpen || Object.keys(sections)[0];
  });
}

function loadArticle(section, idx) {
  var item = navData[section][idx];
  if (!item) return Promise.reject(new Error('no article at ' + section + '[' + idx + ']'));
  var slug = item.slug;
  if (articleCache[slug]) return Promise.resolve(articleCache[slug]);
  return fetch('articles/' + section + '/' + slug + '.html', { cache: 'no-cache' }).then(function(r) {
    if (!r.ok) throw new Error('article fetch failed: ' + slug + ' (' + r.status + ')');
    return r.text();
  }).then(function(html) {
    var doc = new DOMParser().parseFromString(html, 'text/html');
    var parsed = { ru: '', en: '' };
    ['ru', 'en'].forEach(function(lang) {
      var s = doc.querySelector('section[data-lang="' + lang + '"]');
      if (s) parsed[lang] = s.innerHTML;
    });
    articleCache[slug] = parsed;
    return parsed;
  });
}

function renderNav() {
  var el = document.getElementById('nav');
  el.innerHTML = '';
  Object.keys(sections).forEach(function(sec) {
    var s = sections[sec][currentLang];
    var open = sectionOpen[sec];
    var items = navData[sec];

    var header = document.createElement('div');
    header.className = 'nav-section-header';
    header.innerHTML = '<span class="nav-section-title">' + s.label + '</span><span class="nav-section-arrow' + (open ? ' open' : '') + '" id="arrow-' + sec + '">▾</span>';
    header.onclick = (function(section){ return function() { toggleSection(section); }; })(sec);
    el.appendChild(header);

    var wrap = document.createElement('div');
    wrap.className = 'nav-section-items';
    wrap.id = 'section-' + sec;
    var totalH = items.length * 52;
    wrap.style.maxHeight = open ? totalH + 'px' : '0px';

    items.forEach(function(item, i) {
      var d = item[currentLang];
      var div = document.createElement('div');
      var isActive = currentSection === sec && currentArticle === i;
      div.className = 'nav-item' + (isActive ? ' active' : '');
      div.onclick = (function(s2, idx){ return function(){ showArticle(s2, idx); }; })(sec, i);
      div.innerHTML = '<div class="nav-icon" style="background:' + item.bg + ';color:' + item.color + '">' + item.icon + '</div>' +
        '<div><div class="nav-label">' + d.label + '</div><div class="nav-tag">' + d.tag + '</div></div>';
      wrap.appendChild(div);
    });
    el.appendChild(wrap);
  });
}

function toggleSection(sec) {
  sectionOpen[sec] = !sectionOpen[sec];
  var wrap = document.getElementById('section-' + sec);
  var arrow = document.getElementById('arrow-' + sec);
  var items = navData[sec];
  if (sectionOpen[sec]) {
    wrap.style.maxHeight = (items.length * 52) + 'px';
    arrow.classList.add('open');
  } else {
    wrap.style.maxHeight = '0px';
    arrow.classList.remove('open');
  }
}

function updateCurrentTitle() {
  var el = document.getElementById('current-article-title');
  if (!el) return;
  var item = navData[currentSection] && navData[currentSection][currentArticle];
  if (!item) { el.textContent = ''; return; }
  var d = item[currentLang] || item.ru || item.en;
  el.textContent = d ? d.label : '';
}

function renderArticle() {
  var content = document.getElementById('content');
  loadArticle(currentSection, currentArticle).then(function(parsed) {
    content.innerHTML = parsed[currentLang] || parsed.ru || parsed.en || '';
    document.documentElement.lang = currentLang;
    updateCurrentTitle();
    if (window.highlightCode) window.highlightCode();
    if (content.parentNode) content.scrollTop = 0;
    window.scrollTo(0, 0);
  }).catch(function(err) {
    content.innerHTML = '<p style="color:var(--text-danger)">Failed to load article: ' + err.message + '</p>';
  });
}

function showArticle(section, id) {
  currentSection = section;
  currentArticle = id;
  if (!sectionOpen[section]) sectionOpen[section] = true;
  renderNav();
  renderArticle();
  if (window.matchMedia('(max-width: 720px)').matches) closeDrawer();
}

function openDrawer() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('sidebar-title').textContent = lang === 'ru' ? 'Навигация' : 'Navigation';
  var toggleBtn = document.getElementById('nav-toggle');
  if (toggleBtn) toggleBtn.setAttribute('aria-label', lang === 'ru' ? 'Открыть меню' : 'Open menu');
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent === lang.toUpperCase());
  });
  renderNav();
  renderArticle();
}

loadManifest().then(function() {
  renderNav();
  renderArticle();
}).catch(function(err) {
  document.getElementById('content').innerHTML =
    '<p style="color:var(--text-danger)">Failed to load manifest: ' + err.message + '</p>';
});

</script>
<script>
(function(){
  function esc(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function tokenizeSQL(code){
    var re=/(--[^\n]*)|(\/\*[\s\S]*?\*\/)|('(?:[^'\\]|\\.)*')|(\b(?:SELECT|FROM|WHERE|JOIN|LEFT|INNER|RIGHT|FULL|OUTER|ON|HAVING|WITH|AS|DISTINCT|CASE|WHEN|THEN|ELSE|END|AND|OR|NOT|IN|IS|NULL|BETWEEN|LIKE|LIMIT|OFFSET|UNION|ALL|INSERT|UPDATE|DELETE|CREATE|TABLE|VIEW|OVER|PRECEDING|FOLLOWING|NULLIF|COALESCE|CAST|TRIM|UPPER|LOWER|ROUND|COUNT|SUM|AVG|MIN|MAX|DATE_TRUNC|TO_CHAR|INTERVAL|DECIMAL)\b)/gi;
    var out='',pos=0,m;
    re.lastIndex=0;
    while((m=re.exec(code))!==null){
      out+=esc(code.slice(pos,m.index));
      if(m[1]||m[2]) out+='<span class="cm-sql">'+esc(m[0])+'</span>';
      else if(m[3])  out+='<span class="str-sql">'+esc(m[0])+'</span>';
      else if(m[4])  out+='<span class="kw-sql">'+esc(m[0])+'</span>';
      pos=m.index+m[0].length;
    }
    return out+esc(code.slice(pos));
  }

  function tokenizePY(code){
    var re=/(#[^\n]*)|("""[\s\S]*?"""|'''[\s\S]*?'''|f?"(?:[^"\\]|\\.)*"|f?'(?:[^'\\]|\\.)*')|(\b(?:import|from|as|def|class|return|if|elif|else|for|while|in|not|and|or|is|None|True|False|try|except|finally|with|pass|break|continue|raise|yield|lambda|global|nonlocal|del)\b)|(\b(?:print|len|range|int|float|str|list|dict|set|tuple|bool|type|isinstance|enumerate|zip|map|filter|sorted|sum|min|max|round|abs|open)(?=\s*\())|(\b\d+(?:\.\d+)?\b)/g;
    var out='',pos=0,m;
    re.lastIndex=0;
    while((m=re.exec(code))!==null){
      out+=esc(code.slice(pos,m.index));
      if(m[1])      out+='<span class="cm-py">'+esc(m[0])+'</span>';
      else if(m[2]) out+='<span class="str-py">'+esc(m[0])+'</span>';
      else if(m[3]) out+='<span class="kw-py">'+esc(m[0])+'</span>';
      else if(m[4]) out+='<span class="kw-blt">'+esc(m[0])+'</span>';
      else if(m[5]) out+='<span class="dec-py">'+esc(m[0])+'</span>';
      pos=m.index+m[0].length;
    }
    return out+esc(code.slice(pos));
  }

  function detect(code){
    var sql=(code.match(/\b(?:SELECT|FROM|WHERE|JOIN|GROUP BY|ORDER BY|WITH|INSERT)\b/gi)||[]).length;
    var py=(code.match(/\b(?:import|def |print\(|elif|True|False|None)\b/g)||[]).length;
    if(sql===0&&py===0) return null;
    return sql>=py?'sql':'python';
  }

  function highlight(){
    document.querySelectorAll('pre > code').forEach(function(block){
      var raw=block.textContent;
      var lang=detect(raw);
      if(!lang) return;
      block.innerHTML=lang==='sql'?tokenizeSQL(raw):tokenizePY(raw);
      var badge=document.createElement('span');
      badge.className='lang-badge';
      badge.textContent=lang.toUpperCase();
      block.parentNode.appendChild(badge);
    });
  }

  window.highlightCode = highlight;
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',highlight);
  } else { highlight(); }
})();

</script>
</body>
</html>
